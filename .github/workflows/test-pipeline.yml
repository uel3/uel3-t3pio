name: Test T3pio

on:
  push:
    branches: [ test_githubaction ]
  pull_request:
    branches: [ test_githubaction ]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java (required for Nextflow)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/


      - name: Run test pipeline
        shell: bash -l {0}  # ensures Conda activation
        run: |
          nextflow run main.nf -profile singularity --input toy_data/reads --run_compare_primers false --contig_file toy_data/contigs --outdir test

